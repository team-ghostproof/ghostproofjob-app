name: Verify (benchmark + full suite)

# The gate that protects the stable build. Runs on EVERY push/PR to main and once
# daily, so a regression surfaces within 24h even if nothing was pushed (live data
# and third-party drift can break a build that hasn't changed).
#
# Green here is the precondition for promoting main -> stable. See docs/release-policy.md.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 12 * * *'      # 12:00 UTC daily
  workflow_dispatch:

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: "§4 benchmark (boot harness, mirror, ids, handlers, versions)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci || npm install
      - name: Run the §4 benchmark
        run: npm run benchmark

  backend:
    name: "Backend suites"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci || npm install
      - run: npm run test:match
      - run: npm run test:growth
      - run: npm run test:email
      - run: npm run test:apply
      - run: npm run test:seo
      - run: npm run test:billing

  rules:
    name: "Firestore rules (emulator)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }
      - run: npm ci || npm install
      - run: npm install -g firebase-tools
      - run: npm run test:rules

  e2e:
    name: "Playwright"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci || npm install
      - run: npx playwright install --with-deps chromium
      # workers=2: the suite is known to flake under parallel load on a saturated
      # machine (failures rotate run-to-run and pass 3/3 isolated). Two workers is
      # the documented stable setting — do not raise it to "speed up" CI.
      # The json reporter is what makes a failure DIAGNOSABLE: the GitHub API does
      # not expose Playwright's annotations, so the first red run cost a round of
      # guessing. The summary step below prints the failing test names into the log.
      - run: npx playwright test --project=chromium --workers=2 --reporter=line,json
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: pw-results.json
      - name: Name the failing tests (so the log answers "which one?")
        if: failure()
        run: |
          echo "::group::Failing tests"
          node -e '
            const fs=require("fs");
            if(!fs.existsSync("pw-results.json")){ console.log("no json report — see the run log above"); process.exit(0); }
            const r=JSON.parse(fs.readFileSync("pw-results.json","utf8"));
            const bad=[];
            const walk=(s)=>{ (s.suites||[]).forEach(walk); (s.specs||[]).forEach(sp=>{
              (sp.tests||[]).forEach(t=>{ if(t.status!=="expected"&&t.status!=="skipped"){
                const res=(t.results||[])[0]||{};
                bad.push({title:sp.title, file:sp.file, line:sp.line, status:t.status,
                  error:((res.error||{}).message||"").split("\n").slice(0,4).join(" | ")});
              }});
            }); };
            (r.suites||[]).forEach(walk);
            if(!bad.length){ console.log("Reporter saw no failed specs (infra/timeout failure — check the log)."); }
            bad.forEach(b=>console.log("FAILED  "+b.file+":"+b.line+"  "+b.title+"\n        status="+b.status+"\n        "+b.error+"\n"));
          '
          echo "::endgroup::"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
            pw-results.json
          retention-days: 14

  # Promotes main -> stable ONLY when every gate above is green, and only for a
  # direct push to main (never a PR). This is the branch the founder can redeploy
  # from at any time, with the guarantee that it passed the full gate.
  promote-stable:
    name: "Promote main -> stable (all gates green)"
    needs: [benchmark, backend, rules, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Fast-forward stable to this verified commit
        run: |
          git config user.name  "gpj-verify-bot"
          git config user.email "noreply@ghostproofjob.com"
          git push origin HEAD:refs/heads/stable --force-with-lease
          echo "stable now points at $(git rev-parse --short HEAD) — full gate green."
