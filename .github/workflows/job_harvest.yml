name: Daily Job Harvest
# NORMAL mode runs automatically every day on the cron below.
# STACKING mode is a manual trigger: Actions tab -> "Daily Job Harvest" ->
# "Run workflow" -> mode: stack. Use it for 2-3 days to flood the DB, then
# just stop triggering it — the daily cron stays on NORMAL and (on day 7)
# resumes pruning automatically. Public repo = free Actions minutes.
on:
  schedule:
    - cron: '0 5 * * *'        # 5:00 AM UTC daily (NORMAL)
  workflow_dispatch:
    inputs:
      mode:
        description: 'stack = aggressive multi-hour pull, pruning OFF  ·  normal = standard daily'
        type: choice
        options: [normal, stack]
        default: normal
jobs:
  harvest:
    runs-on: ubuntu-latest
    # 6h cap for a stacking run, 60m for normal. (Public-repo runners allow 360.)
    timeout-minutes: ${{ github.event.inputs.mode == 'stack' && 360 || 60 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      # Gate: validate the parsers offline before spending any harvest budget.
      # If salary/requirements/doc_id parsing ever regresses, this fails fast.
      - name: Validate parsers (offline self-test)
        run: python scripts/job_spy_harvester.py --selftest
      - name: Run JobSpy harvester
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          STACKING_MODE: ${{ github.event.inputs.mode == 'stack' && '1' || '0' }}
          # ~5h40m budget leaves headroom under the 360m hard cap to stop cleanly.
          RUN_BUDGET_SECS: ${{ github.event.inputs.mode == 'stack' && '20400' || '3120' }}
          # Capture sources + optional employer-page backfill — set via repo Variables
          # (Settings -> Secrets and variables -> Actions -> Variables). The || fallbacks
          # mean an UNSET variable resolves to the harvester's exact current defaults, so
          # adding these changes NOTHING until you opt in (e.g. SITES=linkedin,indeed,google
          # or BACKFILL_MAX=50). Never leave a variable set to an empty value.
          SITES: ${{ vars.SITES || 'linkedin,indeed' }}
          BACKFILL_MAX: ${{ vars.BACKFILL_MAX || '0' }}
        run: python scripts/job_spy_harvester.py
