name: Rules + Match tests

# Backend isolation proof (Firestore emulator + @firebase/rules-unit-testing)
# and the in-repo reverse-match unit tests. The boot harness does NOT exercise
# rules — this is the only real proof of the recruiter-tier privacy isolation
# (recruiter-tier.md §7.4/§7.5). Free (GitHub-hosted).
on:
  push:
    branches: [ main ]
    paths:
      - 'firestore.rules'
      - 'firebase.json'
      - 'tests/rules/**'
      - 'tests/match/**'
      - 'tests/recruiter/**'
      - 'tests/growth/**'
      - 'tests/email/**'
      - 'api/match/**'
      - 'api/recruiter/**'
      - 'api/notifications/**'
      - 'ghost-report-generator/**'
      - 'seo-generator/**'
      - 'tests/seo/**'
      - 'tests/billing/**'
      - 'api/stripe-webhook.js'
      - '.github/workflows/rules.yml'
  pull_request:
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # the Firestore emulator requires a JRE
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install deps
        run: npm install

      - name: Backend unit tests — reverse-match + recruiter domain-check (no emulator)
        run: npm run test:match

      - name: Growth content-engine tests (defamation guardrails)
        run: npm run test:growth

      - name: Email opt-out tests (CAN-SPAM suppression + footer)
        run: npm run test:email

      - name: SEO page tests (honesty rules + zero runtime reads)
        run: npm run test:seo

      - name: Billing tests (Stripe entitlement grant/revoke)
        run: npm run test:billing

      - name: Rules isolation tests (Firestore emulator)
        run: npm run test:rules
